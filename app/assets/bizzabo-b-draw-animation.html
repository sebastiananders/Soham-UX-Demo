<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizzabo B — Agent Working</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 60px;
  }

  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    flex-wrap: wrap;
  }

  .demo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .demo-label {
    font-family: system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
  }

  /* ═══════════════════════════════════════
     VARIANT 1: CONTINUOUS DRAW LOOP
     Single stroke that draws on, holds, then resets
  ═══════════════════════════════════════ */

  .v1 .b-stroke {
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: draw1 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  .v1 .b-fill {
    animation: fill1 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  @keyframes draw1 {
    0%   { stroke-dashoffset: 1200; }
    60%  { stroke-dashoffset: 0; }
    85%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes fill1 {
    0%   { fill-opacity: 0; }
    50%  { fill-opacity: 0; }
    70%  { fill-opacity: 1; }
    85%  { fill-opacity: 1; }
    95%  { fill-opacity: 0; }
    100% { fill-opacity: 0; }
  }

  /* ═══════════════════════════════════════
     VARIANT 2: DRAW ON + FADE STROKE OUT
     Stroke draws, fill appears, stroke fades — then repeats
  ═══════════════════════════════════════ */

  .v2 .b-stroke {
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: draw2 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
  }
  .v2 .b-fill {
    animation: fill2 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
  }
  .v2 .b-stroke-fade {
    stroke-dasharray: 0;
    stroke-dashoffset: 0;
    animation: strokeFade2 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
  }

  @keyframes draw2 {
    0%   { stroke-dashoffset: 1200; }
    45%  { stroke-dashoffset: 0; }
    55%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes fill2 {
    0%   { fill-opacity: 0; }
    40%  { fill-opacity: 0; }
    55%  { fill-opacity: 1; }
    75%  { fill-opacity: 1; }
    90%  { fill-opacity: 0; }
    100% { fill-opacity: 0; }
  }
  @keyframes strokeFade2 {
    0%   { stroke-opacity: 0; }
    45%  { stroke-opacity: 0; }
    55%  { stroke-opacity: 1; }
    70%  { stroke-opacity: 0; }
    100% { stroke-opacity: 0; }
  }

  /* ═══════════════════════════════════════
     VARIANT 3: PERPETUAL — never fully completes
     Draws on and erases from behind, always moving
  ═══════════════════════════════════════ */

  .v3 .b-stroke {
    stroke-dasharray: 400 800;
    animation: draw3 2.5s linear infinite;
  }

  @keyframes draw3 {
    0%   { stroke-dashoffset: 1200; }
    100% { stroke-dashoffset: 0; }
  }

  /* ═══════════════════════════════════════
     VARIANT 4: SLOW MATERIALIZATION
     Very slow draw, subtle glow, fills gently
  ═══════════════════════════════════════ */

  .v4 .b-stroke {
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: draw4 5s ease-in-out infinite;
    filter: url(#glow);
  }
  .v4 .b-fill {
    animation: fill4 5s ease-in-out infinite;
  }

  @keyframes draw4 {
    0%   { stroke-dashoffset: 1200; stroke-opacity: 0.4; }
    15%  { stroke-opacity: 1; }
    55%  { stroke-dashoffset: 0; stroke-opacity: 1; }
    70%  { stroke-dashoffset: 0; stroke-opacity: 0.3; }
    85%  { stroke-dashoffset: 0; stroke-opacity: 0; }
    100% { stroke-dashoffset: 1200; stroke-opacity: 0; }
  }
  @keyframes fill4 {
    0%   { fill-opacity: 0; }
    50%  { fill-opacity: 0; }
    65%  { fill-opacity: 1; }
    80%  { fill-opacity: 1; }
    95%  { fill-opacity: 0; }
    100% { fill-opacity: 0; }
  }

</style>
</head>

      <feGaussianBlur stdDeviation="2" result="blur"/>

        <feMergeNode in="SourceGraphic"/>

</svg>
